name: kdesrc-build-install
type: shell
commands:
  - git clone --depth=1 https://invent.kde.org/sdk/kdesrc-build.git /usr/kdesrc-build
  - cd /usr/kdesrc-build
  - ./kdesrc-build --initial-setup

modules:
- name: kdeconnect-deps
  type: apt
  sources:
    - packages:
      - git
      - cmake
      - ninja-build
      - build-essential
      - extra-cmake-modules
      - qt6-base-dev
      - qt6-tools-dev
      - qt6-tools-dev-tools
      - qt6-declarative-dev
      - libqt6svg6-dev
      - libkf6config-dev
      - libkf6coreaddons-dev
      - libkf6i18n-dev
      - libkf6kio-dev
      - libkf6notifications-dev
      - libkf6dbusaddons-dev
      - libkf6service-dev
      - libkf6windowsystem-dev
      - libpulse-dev
      - libsasl2-dev
      - libssl-dev
      - libglib2.0-dev
      - dbus
      - ca-certificates